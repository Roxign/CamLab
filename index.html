<!DOCTYPE html>
<html lang="en">

<head>
    <title>CamLab: Interactive Camera Intrinsics Analysis Tool</title>
    <meta name="description" content="CamLab lets you explore camera intrinsics, distortion, extrinsics, and chessboard designs in real time." />
    <meta name="google-site-verification" content="GW-YKJveTf8AuwYxDb-nZdcywpYg1ez5yTVXkY_H7fo" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="column">
        <!-- <h1 style="text-align: center;">Camera Intrinsic & Distortion Visualization</h1> -->
        <div class="repo-link-row">
            <a href="https://github.com/Roxign/CamLab" target="_blank" rel="noopener noreferrer">CamLab on GitHub</a>
        </div>
        <div class="view-tab-row" role="tablist" aria-label="Visualization view tabs">
            <button id="viewChessboard" type="button" role="tab" aria-selected="true" aria-controls="canvas">Chessboard</button>
            <button id="viewCurve" type="button" role="tab" aria-selected="false" aria-controls="curveCanvas">Distortion Curve</button>
        </div>
        <div class="canvas-stack">
            <canvas id="canvas" width="640" height="360"></canvas>
            <canvas id="curveCanvas" class="hidden" width="640" height="480"></canvas>
        </div>
        <div class="curve-axis-options" id="curveAxisOptions">
            <div class="axis-group">
                <span>X type:</span>
                <label><input type="radio" id="curveXTypeAngle" name="curveXType" value="angle" checked data-curve-axis="x" data-curve-role="type" data-axis-label="incoming ray angle"> incoming ray angle</label>
                <label><input type="radio" id="curveXTypeSlope" name="curveXType" value="slope" data-curve-axis="x" data-curve-role="type" data-axis-label="incoming ray slope (tanθ)"> incoming ray slope</label>
                <label><input type="radio" id="curveXTypeHeight" name="curveXType" value="height" data-curve-axis="x" data-curve-role="type" data-axis-label="incoming image height"> reference height</label>
            </div>
            <div class="axis-group" id="curveXUnitGroup" data-curve-axis="x" data-curve-role="unit-group">
                <span>X unit:</span>
                <label><input type="radio" id="curveXUnitDeg" name="curveXUnit" value="deg" checked data-curve-axis="x" data-curve-role="unit" data-unit-kind="angle"> deg</label>
                <label><input type="radio" id="curveXUnitRad" name="curveXUnit" value="rad" data-curve-axis="x" data-curve-role="unit" data-unit-kind="angle"> rad</label>
                <label><input type="radio" id="curveXUnitPixel" name="curveXUnit" value="pixel" data-curve-axis="x" data-curve-role="unit" data-unit-kind="height"> pixel</label>
                <label><input type="radio" id="curveXUnitUm" name="curveXUnit" value="um" data-curve-axis="x" data-curve-role="unit" data-unit-kind="height"> um</label>
                <label><input type="radio" id="curveXUnitMm" name="curveXUnit" value="mm" data-curve-axis="x" data-curve-role="unit" data-unit-kind="height"> mm</label>
                <label><input type="radio" id="curveXUnitCm" name="curveXUnit" value="cm" data-curve-axis="x" data-curve-role="unit" data-unit-kind="height"> cm</label>
                <label><input type="radio" id="curveXUnitM" name="curveXUnit" value="m" data-curve-axis="x" data-curve-role="unit" data-unit-kind="height"> m</label>
            </div>
            <div class="axis-group">
                <span>Y type:</span>
                <label><input type="radio" id="curveYTypeAngle" name="curveYType" value="angle" checked data-curve-axis="y" data-curve-role="type" data-axis-label="reflected ray angle"> reflected ray angle</label>
                <label><input type="radio" id="curveYTypeSlope" name="curveYType" value="slope" data-curve-axis="y" data-curve-role="type" data-axis-label="reflected ray slope (tanθ)"> reflected ray slope</label>
                <label><input type="radio" id="curveYTypeHeight" name="curveYType" value="height" data-curve-axis="y" data-curve-role="type" data-axis-label="image height"> measured height</label>
            </div>
            <div class="axis-group" id="curveYUnitGroup" data-curve-axis="y" data-curve-role="unit-group">
                <span>Y unit:</span>
                <label><input type="radio" id="curveYUnitDeg" name="curveYUnit" value="deg" checked data-curve-axis="y" data-curve-role="unit" data-unit-kind="angle"> deg</label>
                <label><input type="radio" id="curveYUnitRad" name="curveYUnit" value="rad" data-curve-axis="y" data-curve-role="unit" data-unit-kind="angle"> rad</label>
                <label><input type="radio" id="curveYUnitPixel" name="curveYUnit" value="pixel" data-curve-axis="y" data-curve-role="unit" data-unit-kind="height"> pixel</label>
                <label><input type="radio" id="curveYUnitUm" name="curveYUnit" value="um" data-curve-axis="y" data-curve-role="unit" data-unit-kind="height"> um</label>
                <label><input type="radio" id="curveYUnitMm" name="curveYUnit" value="mm" data-curve-axis="y" data-curve-role="unit" data-unit-kind="height"> mm</label>
                <label><input type="radio" id="curveYUnitCm" name="curveYUnit" value="cm" data-curve-axis="y" data-curve-role="unit" data-unit-kind="height"> cm</label>
                <label><input type="radio" id="curveYUnitM" name="curveYUnit" value="m" data-curve-axis="y" data-curve-role="unit" data-unit-kind="height"> m</label>
            </div>
            <div class="curve-direction-row" id="curveDirectionControls">
                <div class="curve-direction-inputs">
                    <div class="curve-direction-angle-col">
                        <div class="curve-direction-angle-row">
                            <label for="curveDirectionAngleText">image-plane angle (deg)</label>
                            <input type="text" id="curveDirectionAngleText" value="45">
                        </div>
                        <input type="range" id="curveDirectionAngle" min="-180" max="180" value="45" step="1">
                        <div class="curve-direction-pad" aria-label="Direction presets">
                            <button type="button" data-curve-direction-target="TL" aria-label="Top-left">TL</button>
                            <button type="button" data-curve-direction-target="T" aria-label="Top">T</button>
                            <button type="button" data-curve-direction-target="TR" aria-label="Top-right">TR</button>
                            <button type="button" data-curve-direction-target="L" aria-label="Left">L</button>
                            <span class="curve-direction-pad-hole" aria-hidden="true"></span>
                            <button type="button" data-curve-direction-target="R" aria-label="Right">R</button>
                            <button type="button" data-curve-direction-target="BL" aria-label="Bottom-left">BL</button>
                            <button type="button" data-curve-direction-target="B" aria-label="Bottom">B</button>
                            <button type="button" data-curve-direction-target="BR" aria-label="Bottom-right">BR</button>
                        </div>
                    </div>
                </div>
                <div class="curve-direction-preview-wrap">
                    <canvas id="directionCanvas" width="220" height="124"></canvas>
                </div>
            </div>
        </div>
    </div>
    <div class="controls">
        <div class="column">

            <!-- Intrinsic -->
            <div>
                <label style="font-family: 'sans-serif'; font-weight: bold; font-size: 20px;">Intrinsic:</label>
            </div>
            <div class="pixel-size-row">
                <label for="psText">um/px</label>
                <input type="text" id="psText" value="1.0">
            </div>
            <div>
                <label for="iw">iw</label>
                <input type="text" id="iwText" value="1920">
                <input type="range" id="iw" name="iw" min="100" max="10000" value="1920">
            </div>
            <div>
                <label for="ih">ih</label>
                <input type="text" id="ihText" value="1080">
                <input type="range" id="ih" name="ih" min="100" max="10000" value="1080">
            </div>
            <div>
                <label for="fx">f<sub>x</sub></label>
                <input type="text" id="fxText" value="1000">
                <input type="range" id="fx" name="fx" min="100" max="10000" value="1000">
            </div>
            <div>
                <label for="fy">f<sub>y</sub></label>
                <input type="text" id="fyText" value="1000">
                <input type="range" id="fy" name="fy" min="100" max="10000" value="1000">
            </div>
            <div>
                <label for="cx">c<sub>x</sub></label>
                <input type="text" id="cxText" value="960">
                <input type="range" id="cx" name="cx" min="0" max="1920" value="960">
            </div>
            <div>
                <label for="cy">c<sub>y</sub></label>
                <input type="text" id="cyText" value="540">
                <input type="range" id="cy" name="cy" min="0" max="1080" value="540">
            </div>

            <!-- Distortion -->
            <div>
                <label style="font-family: 'sans-serif'; font-weight: bold; font-size: 20px;">Distortion:</label>
            </div>
            <div>
                <label for="k1">k<sub>1</sub></label>
                <input type="text" id="k1Text" value="0">
                <input type="range" id="k1" name="k1" min="-1" max="1" value="0" step="0.01">
            </div>
            <div>
                <label for="k2">k<sub>2</sub></label>
                <input type="text" id="k2Text" value="0">
                <input type="range" id="k2" name="k2" min="-1" max="1" value="0" step="0.01">
            </div>
            <div>
                <label for="p1">p<sub>1</sub></label>
                <input type="text" id="p1Text" value="0">
                <input type="range" id="p1" name="p1" min="-1" max="1" value="0" step="0.01">
            </div>
            <div>
                <label for="p2">p<sub>2</sub></label>
                <input type="text" id="p2Text" value="0">
                <input type="range" id="p2" name="p2" min="-1" max="1" value="0" step="0.01">
            </div>
            <div>
                <label for="k3">k<sub>3</sub></label>
                <input type="text" id="k3Text" value="0">
                <input type="range" id="k3" name="k3" min="-1" max="1" value="0" step="0.01">
            </div>
            <div>
                <label for="k4">k<sub>4</sub></label>
                <input type="text" id="k4Text" value="0">
                <input type="range" id="k4" name="k4" min="-1" max="1" value="0" step="0.01">
            </div>
            <div>
                <label for="k5">k<sub>5</sub></label>
                <input type="text" id="k5Text" value="0">
                <input type="range" id="k5" name="k5" min="-1" max="1" value="0" step="0.01">
            </div>
            <div>
                <label for="k6">k<sub>6</sub></label>
                <input type="text" id="k6Text" value="0">
                <input type="range" id="k6" name="k6" min="-1" max="1" value="0" step="0.01">
            </div>
            <div>
                <label for="fisheye">KB</label>
                <input type="checkbox" id="fisheye" name="fisheye">
            </div>
        </div>
        <div class="column">

            <!-- Extrinsic -->
            <div class="extrinsic-header-row">
                <label style="font-family: 'sans-serif'; font-weight: bold; font-size: 20px;">Extrinsic:</label>
                <div class="extrinsic-mode-row" role="tablist" aria-label="Extrinsic transform mode tabs">
                    <button id="world2cam" type="button" role="tab" aria-selected="true" class="active">world2cam</button>
                    <button id="cam2world" type="button" role="tab" aria-selected="false">cam2world</button>
                </div>
            </div>
            <div>
                <label for="rx">r<sub>x</sub></label>
                <input type="text" id="rxText" value="0">
                <input type="range" id="rx" name="rx" min="-180" max="180" value="0">
            </div>
            <div>
                <label for="ry">r<sub>y</sub></label>
                <input type="text" id="ryText" value="0">
                <input type="range" id="ry" name="ry" min="-180" max="180" value="0">
            </div>
            <div>
                <label for="rz">r<sub>z</sub></label>
                <input type="text" id="rzText" value="0">
                <input type="range" id="rz" name="rz" min="-180" max="180" value="0">
            </div>
            <div>
                <label for="tx">t<sub>x</sub></label>
                <input type="text" id="txText" value="0">
                <input type="range" id="tx" name="tx" min="-1000" max="1000" value="0">
            </div>
            <div>
                <label for="ty">t<sub>y</sub></label>
                <input type="text" id="tyText" value="0">
                <input type="range" id="ty" name="ty" min="-1000" max="1000" value="0">
            </div>
            <div>
                <label for="tz">t<sub>z</sub></label>
                <input type="text" id="tzText" value="1000">
                <input type="range" id="tz" name="tz" min="-10000" max="10000" value="1000">
            </div>
            <!-- Chessboard -->
            <div class="chessboard-header-row">
                <label style="font-family: 'sans-serif'; font-weight: bold; font-size: 20px;">Chessboard:</label>
                <div class="center-mode-row" role="tablist" aria-label="Chessboard coordinate origin tabs">
                    <button id="centerAtTL" type="button" role="tab" aria-selected="false" title="Chessboard coordinate system starts at top-left">TL-CS</button>
                    <button id="centerAtCenter" type="button" role="tab" aria-selected="true" class="active" title="Chessboard coordinate system is centered">CT-CS</button>
                </div>
            </div>
            <div>
                <!-- number of inner corners along width (bc) and height (br) -->
                <label for="bc">bc</label>
                <input type="text" id="bcText" value="12">
                <input type="range" id="bc" name="bc" min="3" max="100" value="12">
            </div>
            <div>
                <label for="br">br</label>
                <input type="text" id="brText" value="9">
                <input type="range" id="br" name="br" min="3" max="100" value="9">
            </div>
            <div>
                <label for="bw">bw</label>
                <input type="text" id="bwText" value="100">
                <input type="range" id="bw" name="bw" min="1" max="1000" value="100">
            </div>
            <div>
                <label for="bh">bh</label>
                <input type="text" id="bhText" value="100">
                <input type="range" id="bh" name="bh" min="1" max="1000" value="100">
            </div>
            <div>
                <label for="showSquares">■□</label>
                <input type="checkbox" id="showSquares" name="showSquares">
            </div>
            <div>
                <!-- when enabled draw filled circles at each corner after the board is rendered -->
                <label for="showCircles">●●</label>
                <input type="checkbox" id="showCircles" name="showCircles" checked="true">
            </div>
            <button id="reset">Reset</button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>


</html>
