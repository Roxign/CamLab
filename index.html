<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            display: flex;
            justify-content: center;
        }
        .controls {
            display: flex;
            flex-direction: row;
            gap: 10px;
            margin-left: 10px;
        }
        .column {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-left: 10px;
        }
        .controls label {
            display: inline-block;
            width: 15px;
            font-family: monospace;
        }
        .controls input[type="text"] {
            width: 40px;
            text-align: right;
        }
        .controls input[type="range"] {
            width: 200px;
        }
        .controls input[type="checkbox"]{
            width: 20px;
            height: 20px;
            vertical-align: middle;
            margin-left: 0px;
        }
        canvas {
            border: 1px solid black;
            background-color: lightgray;
        }
    </style>
</head>
<body>
    <div class="column">
        <!-- <h1 style="text-align: center;">Camera Intrinsic & Distortion Visualization</h1> -->
        <label style="text-align: center; font-family: 'sans-serif'; font-weight: bold; font-size: 32px;">Camera Intrinsic & Distortion Visualization</label>
        <canvas id="canvas" width="640" height="360"></canvas>
    </div>
    <div class="controls">
        <div class="column">

            <!-- Intrinsic -->
            <div>
                <label style="font-family: 'sans-serif'; font-weight: bold; font-size: 20px;">Intrinsic:</label>
            </div>
            <div>
                <label for="iw">iw</label>
                <input type="text" id="iwText" value="1920">
                <input type="range" id="iw" name="iw" min="100" max="10000" value="1920">
            </div>
            <div>
                <label for="ih">ih</label>
                <input type="text" id="ihText" value="1080">
                <input type="range" id="ih" name="ih" min="100" max="10000" value="1080">
            </div>
            <div>
                <label for="fx">f<sub>x</sub></label>
                <input type="text" id="fxText" value="1000">
                <input type="range" id="fx" name="fx" min="100" max="10000" value="1000">
            </div>
            <div>
                <label for="fy">f<sub>y</sub></label>
                <input type="text" id="fyText" value="1000">
                <input type="range" id="fy" name="fy" min="100" max="10000" value="1000">
            </div>
            <div>
                <label for="cx">c<sub>x</sub></label>
                <input type="text" id="cxText" value="960">
                <input type="range" id="cx" name="cx" min="0" max="1920" value="960">
            </div>
            <div>
                <label for="cy">c<sub>y</sub></label>
                <input type="text" id="cyText" value="540">
                <input type="range" id="cy" name="cy" min="0" max="1080" value="540">
            </div>

            <!-- Distortion -->
            <div>
                <label style="font-family: 'sans-serif'; font-weight: bold; font-size: 20px;">Distortion:</label>
            </div>
            <div>
                <label for="k1">k<sub>1</sub></label>
                <input type="text" id="k1Text" value="0">
                <input type="range" id="k1" name="k1" min="-1" max="1" value="0" step="0.01">
            </div>
            <div>
                <label for="k2">k<sub>2</sub></label>
                <input type="text" id="k2Text" value="0">
                <input type="range" id="k2" name="k2" min="-1" max="1" value="0" step="0.01">
            </div>
            <div>
                <label for="p1">p<sub>1</sub></label>
                <input type="text" id="p1Text" value="0">
                <input type="range" id="p1" name="p1" min="-1" max="1" value="0" step="0.01">
            </div>
            <div>
                <label for="p2">p<sub>2</sub></label>
                <input type="text" id="p2Text" value="0">
                <input type="range" id="p2" name="p2" min="-1" max="1" value="0" step="0.01">
            </div>
            <div>
                <label for="k3">k<sub>3</sub></label>
                <input type="text" id="k3Text" value="0">
                <input type="range" id="k3" name="k3" min="-1" max="1" value="0" step="0.01">
            </div>
            <div>
                <label for="k4">k<sub>4</sub></label>
                <input type="text" id="k4Text" value="0">
                <input type="range" id="k4" name="k4" min="-1" max="1" value="0" step="0.01">
            </div>
            <div>
                <label for="k5">k<sub>5</sub></label>
                <input type="text" id="k5Text" value="0">
                <input type="range" id="k5" name="k5" min="-1" max="1" value="0" step="0.01">
            </div>
            <div>
                <label for="k6">k<sub>6</sub></label>
                <input type="text" id="k6Text" value="0">
                <input type="range" id="k6" name="k6" min="-1" max="1" value="0" step="0.01">
            </div>
            <div>
                <label for="fisheye">KB</label>
                <input type="checkbox" id="fisheye" name="fisheye">
            </div>
        </div>
        <div class="column">

            <!-- Extrinsic -->
            <div>
                <label style="font-family: 'sans-serif'; font-weight: bold; font-size: 20px;">Extrinsic:</label>
            </div>
            <div>
                <label for="rx">r<sub>x</sub></label>
                <input type="text" id="rxText" value="0">
                <input type="range" id="rx" name="rx" min="-180" max="180" value="0">
            </div>
            <div>
                <label for="ry">r<sub>y</sub></label>
                <input type="text" id="ryText" value="0">
                <input type="range" id="ry" name="ry" min="-180" max="180" value="0">
            </div>
            <div>
                <label for="rz">r<sub>z</sub></label>
                <input type="text" id="rzText" value="0">
                <input type="range" id="rz" name="rz" min="-180" max="180" value="0">
            </div>
            <div>
                <label for="tx">t<sub>x</sub></label>
                <input type="text" id="txText" value="0">
                <input type="range" id="tx" name="tx" min="-1000" max="1000" value="0">
            </div>
            <div>
                <label for="ty">t<sub>y</sub></label>
                <input type="text" id="tyText" value="0">
                <input type="range" id="ty" name="ty" min="-1000" max="1000" value="0">
            </div>
            <div>
                <label for="tz">t<sub>z</sub></label>
                <input type="text" id="tzText" value="1000">
                <input type="range" id="tz" name="tz" min="-10000" max="10000" value="1000">
            </div>
            <div>
                <label for="inverse">↻</label>
                <input type="checkbox" id="inverse" name="inverse">
            </div>

            <!-- Chessboard -->
            <div>
                <label style="font-family: 'sans-serif'; font-weight: bold; font-size: 20px;">Chessboard:</label>
            </div>
            <div>
                <!-- number of inner corners along width (bc) and height (br) -->
                <label for="bc">bc</label>
                <input type="text" id="bcText" value="12">
                <input type="range" id="bc" name="bc" min="3" max="100" value="12">
            </div>
            <div>
                <label for="br">br</label>
                <input type="text" id="brText" value="9">
                <input type="range" id="br" name="br" min="3" max="100" value="9">
            </div>
            <div>
                <label for="bw">bw</label>
                <input type="text" id="bwText" value="100">
                <input type="range" id="bw" name="bw" min="1" max="1000" value="100">
            </div>
            <div>
                <label for="bh">bh</label>
                <input type="text" id="bhText" value="100">
                <input type="range" id="bh" name="bh" min="1" max="1000" value="100">
            </div>
            <div>
                <label for="center">→←</label>
                <input type="checkbox" id="center" name="center" checked="true">
            </div>
            <div>
                <label for="showSquares">■□</label>
                <input type="checkbox" id="showSquares" name="showSquares" checked="true">
            </div>
            <div>
                <!-- when enabled draw filled circles at each corner after the board is rendered -->
                <label for="showCircles">●●</label>
                <input type="checkbox" id="showCircles" name="showCircles" checked="true">
            </div>
            <button id="reset">Reset</button>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Initial Parameters
        let canvas_w = 640, canvas_h = 360;
        let iw = 1920, ih = 1080, fx = 1000, fy = 1000, cx = 960, cy = 540;
        let k1 = 0, k2 = 0, p1 = 0, p2 = 0, k3 = 0, k4 = 0, k5 = 0, k6 = 0, fisheye = false;
        let bc = 12, br = 9, bw = 100, bh = 100, center = true, showSquares = true, showCircles = true;
        let rx = 0, ry = 0, rz = 0, tx = 0, ty = 0, tz = 1000, inverse = false;

        // undistortion lookup table when showing squares
        let undistortTable = null;

        // Helper that computes the same 3x3 rotation matrix as a
        // function of Euler angles (rx, ry, rz) expressed in radians.
        function eulerAnglesToRotationMatrix(rx, ry, rz) {
            let cosRx = Math.cos(rx), sinRx = Math.sin(rx);
            let cosRy = Math.cos(ry), sinRy = Math.sin(ry);
            let cosRz = Math.cos(rz), sinRz = Math.sin(rz);
            return {
                R11: cosRy * cosRz,
                R12: cosRy * sinRz,
                R13: -sinRy,
                R21: sinRx * sinRy * cosRz - cosRx * sinRz,
                R22: sinRx * sinRy * sinRz + cosRx * cosRz,
                R23: sinRx * cosRy,
                R31: cosRx * sinRy * cosRz + sinRx * sinRz,
                R32: cosRx * sinRy * sinRz - sinRx * cosRz,
                R33: cosRx * cosRy
            };
        }

        function projectPoint(p3d)
        {
            // compute rotation matrix once and reuse
            let {R11, R12, R13, R21, R22, R23, R31, R32, R33} = eulerAnglesToRotationMatrix(rx, ry, rz);

            // Apply rotation & translation
            let [xw, yw, zw] = p3d;
            let xc, yc, zc;
            if (inverse)
            {
                xc = R11 * xw + R21 * yw + R31 * zw + (R11 * tx + R21 * ty + R31 * tz);
                yc = R12 * xw + R22 * yw + R32 * zw + (R12 * tx + R22 * ty + R32 * tz);
                zc = R13 * xw + R23 * yw + R33 * zw + (R13 * tx + R23 * ty + R33 * tz);
            }
            else
            {
                xc = R11 * xw + R12 * yw + R13 * zw + tx;
                yc = R21 * xw + R22 * yw + R23 * zw + ty;
                zc = R31 * xw + R32 * yw + R33 * zw + tz;
            }
            
            // normalize and apply distortion
            [xp, yp] = applyDistortion(xc, yc, zc);

            // apply intrinsics
            let u = fx * xp + cx;
            let v = fy * yp + cy;

            // scale to canvas size (this allows the intrinsic parameters to be specified in terms of an arbitrary image size, independent of the canvas display size)
            u = u * canvas.width / iw;
            v = v * canvas.height / ih;
            return [u, v, zc];
        }

        function drawPoints()
        {
            // if we're rendering the chessboard squares we use the precomputed
            // undistorted ray slopes and then apply the current extrinsic and
            // board parameters to figure out the color per pixel.  the lookup
            // table only depends on intrinsics/distortion so it can be kept
            // around while extrinsic/board values change.
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (showSquares)
            {
                // create a fresh image buffer and fill it using the slopes
                let width = canvas.width, height = canvas.height;
                let img = ctx.createImageData(width, height);
                let data = img.data;

                // compute rotation matrix from Euler angles
                let {R11, R12, R13, R21, R22, R23, R31, R32, R33} = eulerAnglesToRotationMatrix(rx, ry, rz);
                let Tx = -tx;
                let Ty = -ty;
                let Tz = -tz;
                if (!inverse)
                {
                    let tmp;
                    tmp = R12; R12 = R21; R21 = tmp;
                    tmp = R13; R13 = R31; R31 = tmp;
                    tmp = R23; R23 = R32; R32 = tmp;
                    Tx = -R11*tx - R12*ty - R13*tz;
                    Ty = -R21*tx - R22*ty - R23*tz;
                    Tz = -R31*tx - R32*ty - R33*tz;
                }

                // chessboard bounds (corners -> cells)
                // using bc x br corners results in (bc+1) x (br+1) squares.
                let x_min = center ? -(bc+1)/2 : -1;
                let x_max = center ?  (bc+1)/2 : bc;
                let y_min = center ? -(br+1)/2 : -1;
                let y_max = center ?  (br+1)/2 : br;
                x_min *= bw; x_max *= bw;
                y_min *= bh; y_max *= bh;

                for (let v = 0; v < height; v++) {
                    for (let u = 0; u < width; u++) {
                        let idxSl = v * width + u;
                        let dx = undistortTable.dx[idxSl];
                        let dy = undistortTable.dy[idxSl];
                        let dz = 1;
                        let dwx = R11*dx + R12*dy + R13*dz;
                        let dwy = R21*dx + R22*dy + R23*dz;
                        let dwz = R31*dx + R32*dy + R33*dz;
                        let color = 128;
                        if (dwz !== 0) {
                            let s = -Tz / dwz;
                            if (s > 0) {
                                let X = Tx + s * dwx;
                                let Y = Ty + s * dwy;
                                if (X >= x_min && X <= x_max && Y >= y_min && Y <= y_max) {
                                    // cells indexed using floor instead of round
                                    let xi = Math.floor((X - x_min) / bw);
                                    let yi = Math.floor((Y - y_min) / bh);
                                    color = ((xi + yi) % 2 === 0) ? 255 : 0;
                                }
                            }
                        }
                        let idx = (v * width + u) * 4;
                        data[idx] = color;
                        data[idx+1] = color;
                        data[idx+2] = color;
                        data[idx+3] = 255;
                    }
                }
                ctx.putImageData(img, 0, 0);
            }
            
            if (showCircles)
            {
                // overlay filled circles on corners if requested
                objp.forEach(p3d => {
                    let [u, v, zc] = projectPoint(p3d);
                    if (zc > 0)
                    {
                        ctx.fillStyle = "red";
                    }
                    else
                    {
                        ctx.fillStyle = "blue";
                    }
                    ctx.beginPath();
                    ctx.arc(u, v, 3, 0, 2 * Math.PI);
                    ctx.fill();
                });
            }
        }

        // apply distortion model (pinhole radial+tangential or fisheye)
        // to normalized coordinates, returning distorted normalized coordinates
        function applyDistortion(xc, yc, zc)
        {
            // Comments are the original perspective division, but it can cause issues when zc is negative (point behind the camera) or close to zero. Using absolute value of zc can help visualize points behind the camera and avoid extreme distortion for points close to the camera.
            // let xp = xc / zc;
            // let yp = yc / zc;
            let xp = xc / Math.abs(zc);
            let yp = yc / Math.abs(zc);
            if (fisheye)
            {
                let r = Math.sqrt(xp * xp + yp * yp);
                if (r > 0)
                {
                    // Comments are the original fisheye distortion formula, but it can cause issues when zc is negative (point behind the camera) or close to zero. Using atan2 with absolute value of zc can help visualize points behind the camera and avoid extreme distortion for points close to the camera.
                    // let theta1 = Math.atan(Math.sqrt(xc * xc + yc * yc) / zc);
                    let theta1 = Math.atan2(Math.sqrt(xc * xc + yc * yc), zc);
                    let theta2 = theta1 * theta1;
                    let theta3 = theta2 * theta1;
                    let theta5 = theta2 * theta3;
                    let theta7 = theta2 * theta5;
                    let theta9 = theta2 * theta7;
                    let theta_d = theta1 + k1 * theta3 + k2 * theta5 + k3 * theta7 + k4 * theta9;
                    xp = (theta_d / r) * xp;
                    yp = (theta_d / r) * yp;
                }
            }
            else
            {
                let r2 = xp*xp + yp*yp;
                let r4 = r2 * r2;
                let r6 = r4 * r2;
                let radial = (1 + k1*r2 + k2*r4 + k3*r6) / (1 + k4*r2 + k5*r4 + k6*r6);
                let dtx = 2 * p1 * xp * yp + p2 * (r2 + 2 * xp * xp);
                let dty = p1 * (r2 + 2 * yp * yp) + 2 * p2 * xp * yp;
                xp = xp * radial + dtx;
                yp = yp * radial + dty;
            }
            return [xp, yp];
        }

        // solve for undistorted normalized coordinates given a distorted one
        // uses iterative fixed-point method with configurable convergence criteria
        function undistortNormalized(xDist, yDist, maxIter = 3e1, eps = 1e-3)
        {
            let x = xDist, y = yDist;
            for (let i = 0; i < maxIter; i++)
            {
                let [xp, yp] = applyDistortion(x, y, 1);
                let dx = xDist - xp;
                let dy = yDist - yp;
                x += dx;
                y += dy;
                if (dx*dx + dy*dy < eps) break;
            }
            return [x, y];
        }

        function updateUndistortTable() {
            // build a table of undistorted normalized ray slopes (dx,dy).
            // this only depends on the intrinsics and distortion coefficients
            // so it can be reused while extrinsic/board parameters change.
            let width = canvas.width, height = canvas.height;
            let size = width * height;
            let dx = new Float32Array(size);
            let dy = new Float32Array(size);

            for (let v = 0; v < height; v++) {
                for (let u = 0; u < width; u++) {
                    let ud = u * iw / width;
                    let vd = v * ih / height;
                    let xDist = (ud - cx) / fx;
                    let yDist = (vd - cy) / fy;
                    let [xu, yu] = undistortNormalized(xDist, yDist);
                    let idx = v * width + u;
                    dx[idx] = xu;
                    dy[idx] = yu;
                }
            }

            undistortTable = {dx, dy, width, height};
        }

        function updateValuesFromSlider(id)
        {
            const slider = document.getElementById(id);
            const textBox = document.getElementById(id + "Text");
            textBox.value = slider.value;
            updateParameter(id, parseFloat(slider.value));
        }

        function updateValuesFromTextBox(id)
        {
            const textBox = document.getElementById(id + "Text");
            const slider = document.getElementById(id);
            slider.value = textBox.value;
            updateParameter(id, parseFloat(textBox.value));
        }

        function updateParameter(id, value)
        {
            switch(id)
            {
                // Intrinsic
                case 'iw': iw = value; update_iw(); break;
                case 'ih': ih = value; update_ih(); break;
                case 'fx': fx = value; break;
                case 'fy': fy = value; break;
                case 'cx': cx = value; break;
                case 'cy': cy = value; break;

                // Distortion
                case 'k1': k1 = value; break;
                case 'k2': k2 = value; break;
                case 'p1': p1 = value; break;
                case 'p2': p2 = value; break;
                case 'k3': k3 = value; break;
                case 'k4': k4 = value; break;
                case 'k5': k5 = value; break;
                case 'k6': k6 = value; break;

                // Extrinsic
                case 'rx': rx = value * Math.PI / 180; break;
                case 'ry': ry = value * Math.PI / 180; break;
                case 'rz': rz = value * Math.PI / 180; break;
                case 'tx': tx = value; break;
                case 'ty': ty = value; break;
                case 'tz': tz = value; break;

                // Chessboard
                case 'bc': bc = value; update_objp(); break;
                case 'br': br = value; update_objp(); break;
                case 'bw': bw = value; update_objp(); break;
                case 'bh': bh = value; update_objp(); break;
            }

            // parameters that affect undistortion should rebuild the table
            const rebuildIds = ['iw','ih','fx','fy','cx','cy',
                                'k1','k2','k3','k4','k5','k6',
                                'p1','p2'];
            if (rebuildIds.includes(id) && showSquares) {
                updateUndistortTable();
            }

            drawPoints();
        }

        function update_iw()
        {
            cx = iw / 2;
            document.getElementById('cx').value = cx;
            document.getElementById('cxText').value = cx;
            document.getElementById('cx').max = iw;
            canvas.width = iw * canvas_w / iw;
            canvas.height = ih * canvas_w / iw;
        }
        function update_ih()
        {
            cy = ih / 2;
            document.getElementById('cy').value = cy;
            document.getElementById('cyText').value = cy;
            document.getElementById('cy').max = ih;
            canvas.height = ih * canvas_w / iw;
        }
        // bc and br denote the number of inner corners of the board.  
        // The chessboard therefore has (bc-1) by (br-1) cells.
        function update_objp()
        {
            objp = [];
            let x_min = center ? -(bc-1)/2 : 0;
            let x_max = center ? bc/2 : bc;
            let y_min = center ? -(br-1)/2 : 0;
            let y_max = center ? br/2 : br;
            for (let y = y_min; y < y_max; y++)
            {
                for (let x = x_min; x < x_max; x++)
                {
                    objp.push([x * bw, y * bh, 0]);
                }
            }
        }

        // Intrinsics
        document.getElementById('iw').addEventListener('input', function() { updateValuesFromSlider('iw'); });
        document.getElementById('iwText').addEventListener('input', function() { updateValuesFromTextBox('iw'); });
        document.getElementById('ih').addEventListener('input', function() { updateValuesFromSlider('ih'); });
        document.getElementById('ihText').addEventListener('input', function() { updateValuesFromTextBox('ih'); });
        document.getElementById('fx').addEventListener('input', function() { updateValuesFromSlider('fx'); });
        document.getElementById('fxText').addEventListener('input', function() { updateValuesFromTextBox('fx'); });
        document.getElementById('fy').addEventListener('input', function() { updateValuesFromSlider('fy'); });
        document.getElementById('fyText').addEventListener('input', function() { updateValuesFromTextBox('fy'); });
        document.getElementById('cx').addEventListener('input', function() { updateValuesFromSlider('cx'); });
        document.getElementById('cxText').addEventListener('input', function() { updateValuesFromTextBox('cx'); });
        document.getElementById('cy').addEventListener('input', function() { updateValuesFromSlider('cy'); });
        document.getElementById('cyText').addEventListener('input', function() { updateValuesFromTextBox('cy'); });

        // Distortion
        document.getElementById('k1').addEventListener('input', function() { updateValuesFromSlider('k1'); });
        document.getElementById('k1Text').addEventListener('input', function() { updateValuesFromTextBox('k1'); });
        document.getElementById('k2').addEventListener('input', function() { updateValuesFromSlider('k2'); });
        document.getElementById('k2Text').addEventListener('input', function() { updateValuesFromTextBox('k2'); });
        document.getElementById('p1').addEventListener('input', function() { updateValuesFromSlider('p1'); });
        document.getElementById('p1Text').addEventListener('input', function() { updateValuesFromTextBox('p1'); });
        document.getElementById('p2').addEventListener('input', function() { updateValuesFromSlider('p2'); });
        document.getElementById('p2Text').addEventListener('input', function() { updateValuesFromTextBox('p2'); });
        document.getElementById('k3').addEventListener('input', function() { updateValuesFromSlider('k3'); });
        document.getElementById('k3Text').addEventListener('input', function() { updateValuesFromTextBox('k3'); });
        document.getElementById('k4').addEventListener('input', function() { updateValuesFromSlider('k4'); });
        document.getElementById('k4Text').addEventListener('input', function() { updateValuesFromTextBox('k4'); });
        document.getElementById('k5').addEventListener('input', function() { updateValuesFromSlider('k5'); });
        document.getElementById('k5Text').addEventListener('input', function() { updateValuesFromTextBox('k5'); });
        document.getElementById('k6').addEventListener('input', function() { updateValuesFromSlider('k6'); });
        document.getElementById('k6Text').addEventListener('input', function() { updateValuesFromTextBox('k6'); });
        document.getElementById('fisheye').addEventListener('input', function() {
            fisheye = this.checked;
            if (showSquares) updateUndistortTable();
            drawPoints();
        });

        // Extrinsic
        document.getElementById('rx').addEventListener('input', function() { updateValuesFromSlider('rx'); });
        document.getElementById('rxText').addEventListener('input', function() { updateValuesFromTextBox('rx'); });
        document.getElementById('ry').addEventListener('input', function() { updateValuesFromSlider('ry'); });
        document.getElementById('ryText').addEventListener('input', function() { updateValuesFromTextBox('ry'); });
        document.getElementById('rz').addEventListener('input', function() { updateValuesFromSlider('rz'); });
        document.getElementById('rzText').addEventListener('input', function() { updateValuesFromTextBox('rz'); });
        document.getElementById('tx').addEventListener('input', function() { updateValuesFromSlider('tx'); });
        document.getElementById('txText').addEventListener('input', function() { updateValuesFromTextBox('tx'); });
        document.getElementById('ty').addEventListener('input', function() { updateValuesFromSlider('ty'); });
        document.getElementById('tyText').addEventListener('input', function() { updateValuesFromTextBox('ty'); });
        document.getElementById('tz').addEventListener('input', function() { updateValuesFromSlider('tz'); });
        document.getElementById('tzText').addEventListener('input', function() { updateValuesFromTextBox('tz'); });
        document.getElementById('inverse').addEventListener('input', function() {
            inverse = this.checked;
            drawPoints();
        });

        // Chessboard
        document.getElementById('bc').addEventListener('input', function() { updateValuesFromSlider('bc'); });
        document.getElementById('bcText').addEventListener('input', function() { updateValuesFromTextBox('bc'); });
        document.getElementById('br').addEventListener('input', function() { updateValuesFromSlider('br'); });
        document.getElementById('brText').addEventListener('input', function() { updateValuesFromTextBox('br'); });
        document.getElementById('bw').addEventListener('input', function() { updateValuesFromSlider('bw'); });
        document.getElementById('bwText').addEventListener('input', function() { updateValuesFromTextBox('bw'); });
        document.getElementById('bh').addEventListener('input', function() { updateValuesFromSlider('bh'); });
        document.getElementById('bhText').addEventListener('input', function() { updateValuesFromTextBox('bh'); });
        document.getElementById('center').addEventListener('input', function() {
            // when the origin of the chessboard moves we need to shift
            // the camera translation so that the projected image stays
            // exactly the same.  this was originally attempted by adding
            // an x/y offset only, but that fails once the board is
            // rotated because the center of rotation changes (tz also
            // needs adjustment).  the correct compensation depends on the
            // current rotation matrix and the "inverse" flag.
            //
            // compute the translation of object coordinates that occurs
            // when toggling the flag.  positive delta means the world
            // points move in +x,+y (i.e. switching from centered->uncentered).
            let halfbw = ((bc - 1) / 2) * bw;
            let halfbh = ((br - 1) / 2) * bh;
            let sign = center ? 1 : -1; // current before toggle
            let delta = [sign * halfbw, sign * halfbh, 0];

            // build rotation matrix from Euler angles (same as in projectPoint)
            let {R11, R12, R13, R21, R22, R23, R31, R32, R33} = eulerAnglesToRotationMatrix(rx, ry, rz);

            if (!inverse) {
                // normal case: camera coord = R * world + t
                // when world points shift by delta we want a new t' such
                // that R*(X+delta)+t' = R*X + t → t' = t - R*delta
                let tdx = -(R11 * delta[0] + R12 * delta[1] + R13 * delta[2]);
                let tdy = -(R21 * delta[0] + R22 * delta[1] + R23 * delta[2]);
                let tdz = -(R31 * delta[0] + R32 * delta[1] + R33 * delta[2]);
                tx += tdx;
                ty += tdy;
                tz += tdz;
            } else {
                // inverse mode: camera coord = R * world + R * t
                // here t appears inside R so a shift of world by delta is
                // undone simply by subtracting delta from t.
                tx -= delta[0];
                ty -= delta[1];
                tz -= delta[2];
            }

            // update controls to show the modified translation
            document.getElementById('tx').value = tx;
            document.getElementById('txText').value = tx;
            document.getElementById('ty').value = ty;
            document.getElementById('tyText').value = ty;
            document.getElementById('tz').value = tz;
            document.getElementById('tzText').value = tz;

            center = this.checked;
            update_objp();
            drawPoints();
        });
        document.getElementById('showSquares').addEventListener('input', function() {
            showSquares = this.checked;
            if (showSquares) updateUndistortTable();
            drawPoints();
        });
        document.getElementById('showCircles').addEventListener('input', function() {
            showCircles = this.checked;
            drawPoints();
        });

        // Reset
        document.getElementById('reset').addEventListener('click', () => location.reload());

        objp = [];
        update_objp();
        if (showSquares) updateUndistortTable();
        drawPoints(); // Initial draw
    </script>
</body>
</html>
